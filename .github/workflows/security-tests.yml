name: Security Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'apps/frontend/**'
      - 'apps/backend/**'
      - '.github/workflows/security-tests.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'apps/frontend/**'
      - 'apps/backend/**'
      - '.github/workflows/security-tests.yml'
  workflow_dispatch: # Allow manual triggering

jobs:
  frontend-security:
    name: Frontend Security Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies and build packages
        run: |
          cd ../..
          npm ci --include=optional
          npm run build:packages

      - name: Build and install CLI
        run: |
          cd ../..
          cd apps/cli && npm run build && npm link

      - name: Run security tests
        run: npm run test:security
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Run all tests with coverage
        run: npm run test:coverage

      - name: Build application
        run: npm run build
        env:
          SEMIONT_BACKEND_URL: http://localhost:4000
          SEMIONT_SITE_NAME: Semiont Test
          SEMIONT_OAUTH_ALLOWED_DOMAINS: example.com,test.com

      - name: Start application for security verification
        run: |
          npm start &
          APP_PID=$!
          echo "APP_PID=$APP_PID" >> $GITHUB_ENV
          # Wait for app to start - check the root page instead of /api/health
          timeout 60 bash -c 'until curl -f http://localhost:3000/ 2>/dev/null | grep -q "</html>"; do sleep 2; done' || echo "Frontend not ready yet, continuing..."
          sleep 5
        env:
          SEMIONT_BACKEND_URL: http://localhost:4000
          SEMIONT_SITE_NAME: Semiont Test
          SEMIONT_OAUTH_ALLOWED_DOMAINS: example.com,test.com

      - name: Verify no admin content leakage
        run: |
          echo "Testing admin route security..."

          # This is a Vite SPA: the server returns 200 + index.html for all routes.
          # Client-side auth guards (tested by test:security unit tests) prevent
          # unauthorized access. We verify the server response is the SPA shell and
          # does NOT contain server-rendered admin content or sensitive data.

          # Test 1: Verify admin route returns 200 (SPA shell, not admin content)
          status_code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/admin)
          if [ "$status_code" != "200" ]; then
            echo "❌ UNEXPECTED: Admin route returned $status_code instead of 200"
            echo "SPA server should return 200 for all routes (client-side routing)"
            exit 1
          fi
          echo "✅ Admin route returns 200 (SPA shell served correctly)"

          # Test 2: Verify response is the SPA HTML shell, not server-rendered admin content
          response=$(curl -s http://localhost:3000/admin)

          # Verify it's a valid HTML page (the SPA entry point)
          if ! echo "$response" | grep -qi "<html\|<!DOCTYPE"; then
            echo "❌ UNEXPECTED: Admin route did not return an HTML page"
            exit 1
          fi
          echo "✅ Admin route returns HTML shell (SPA entry point)"

          # Test 3: Verify no server-rendered admin-specific content in the shell
          # The SPA shell should only contain the app bootstrap JS, not admin UI
          if echo "$response" | grep -qi "admin dashboard\|user management\|delete user\|admin control"; then
            echo "❌ SECURITY FAILURE: Server-rendered admin content found in SPA shell!"
            exit 1
          fi
          echo "✅ No server-rendered admin content in SPA shell"

          # Test 4: Verify no sensitive data patterns in HTML shell
          if echo "$response" | grep -qE "postgresql://|sk_[a-zA-Z0-9]+|DELETE|admin@"; then
            echo "❌ SECURITY FAILURE: Sensitive data patterns found in response!"
            exit 1
          fi
          echo "✅ No sensitive data patterns detected"

          echo "🎉 All admin route security checks passed!"

      - name: Verify no moderate content leakage
        run: |
          echo "Testing moderate route security..."

          # This is a Vite SPA: the server returns 200 + index.html for all routes.
          # Client-side auth guards (tested by test:security unit tests) prevent
          # unauthorized access. We verify the server response is the SPA shell and
          # does NOT contain server-rendered moderation content or sensitive data.

          # Test 1: Verify moderate route returns 200 (SPA shell, not moderation content)
          status_code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/moderate)
          if [ "$status_code" != "200" ]; then
            echo "❌ UNEXPECTED: Moderate route returned $status_code instead of 200"
            echo "SPA server should return 200 for all routes (client-side routing)"
            exit 1
          fi
          echo "✅ Moderate route returns 200 (SPA shell served correctly)"

          # Test 2: Verify response is the SPA HTML shell
          response=$(curl -s http://localhost:3000/moderate)

          if ! echo "$response" | grep -qi "<html\|<!DOCTYPE"; then
            echo "❌ UNEXPECTED: Moderate route did not return an HTML page"
            exit 1
          fi
          echo "✅ Moderate route returns HTML shell (SPA entry point)"

          # Test 3: Verify no server-rendered moderation content in the shell
          if echo "$response" | grep -qi "moderator dashboard\|entity.tag\|tag.schema\|linked.data\|recent activity"; then
            echo "❌ SECURITY FAILURE: Server-rendered moderation content found in SPA shell!"
            exit 1
          fi
          echo "✅ No server-rendered moderation content in SPA shell"

          # Test 4: Verify no sensitive data patterns
          if echo "$response" | grep -qE "postgresql://|sk_[a-zA-Z0-9]+|DELETE|admin@"; then
            echo "❌ SECURITY FAILURE: Sensitive data patterns found in response!"
            exit 1
          fi
          echo "✅ No sensitive data patterns detected"

          # Test 5: Verify moderate sub-routes also return 200 (SPA shell)
          for subroute in "/moderate/recent" "/moderate/entity-tags" "/moderate/tag-schemas" "/moderate/linked-data"; do
            status_code=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:3000$subroute")
            if [ "$status_code" != "200" ]; then
              echo "❌ UNEXPECTED: $subroute returned $status_code instead of 200"
              exit 1
            fi
            echo "✅ $subroute returns 200 (SPA shell)"
          done

          echo "🎉 All moderate route security checks passed!"

      - name: Stop application
        if: always()
        run: |
          if [ ! -z "$APP_PID" ]; then
            kill $APP_PID || true
          fi
          # Kill any remaining Node.js processes
          pkill -f "node.*server.js" || true

      - name: Upload test coverage
        uses: codecov/codecov-action@v7.0.0
        if: always()
        with:
          file: ./apps/frontend/coverage/lcov.info
          flags: frontend
          name: frontend-coverage
        continue-on-error: true

  backend-security:
    name: Backend Security Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: testpassword
          POSTGRES_USER: testuser
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Cache TypeScript incremental build info
        uses: actions/cache@v6.1.0
        with:
          path: apps/backend/.tscache
          key: ${{ runner.os }}-backend-tsc-${{ hashFiles('apps/backend/src/**/*.ts', 'apps/backend/tsconfig.json', 'packages/*/src/**/*.ts') }}
          restore-keys: |
            ${{ runner.os }}-backend-tsc-

      - name: Install dependencies and build packages
        run: |
          cd ../..
          npm ci --include=optional
          npm run build:packages

      - name: Build and install CLI
        run: |
          cd ../..
          cd apps/cli && npm run build && npm link
      
      - name: Setup test database and config
        run: |
          # Initialize project configuration
          cd ../..
          semiont init --name "test-project" --environments "ci" --force
          # Write ~/.semiontconfig with ci environment so backend can start
          printf '%s\n' \
            '[environments.ci.backend]' \
            'platform = "posix"' \
            'port = 4000' \
            'publicURL = "http://localhost:4000"' \
            'corsOrigin = "http://localhost:3000"' \
            '' \
            '[environments.ci.site]' \
            'domain = "localhost"' \
            'siteName = "Semiont CI"' \
            'adminEmail = "admin@localhost"' \
            'oauthAllowedDomains = ["localhost"]' \
            '' \
            '[environments.ci.make-meaning.graph]' \
            'type = "memory"' \
            '' \
            '[environments.ci.make-meaning.actors.gatherer.inference]' \
            'type = "ollama"' \
            'model = "llama3"' \
            'baseURL = "http://localhost:11434"' \
            '' \
            '[environments.ci.make-meaning.actors.matcher.inference]' \
            'type = "ollama"' \
            'model = "llama3"' \
            'baseURL = "http://localhost:11434"' \
            '' \
            '[environments.ci.workers.default.inference]' \
            'type = "ollama"' \
            'model = "llama3"' \
            'baseURL = "http://localhost:11434"' \
            > ~/.semiontconfig
          cd apps/backend
          npx prisma db push --url "$DATABASE_URL"
        env:
          DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/testdb

      - name: Run security tests
        run: npm run test:security
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/testdb
          JWT_SECRET: test-secret-for-ci
          GOOGLE_CLIENT_ID: test-client-id
          GOOGLE_CLIENT_SECRET: test-client-secret

      - name: Run all tests with coverage
        run: npm run test:coverage
        env:
          DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/testdb
          JWT_SECRET: test-secret-for-ci
          GOOGLE_CLIENT_ID: test-client-id
          GOOGLE_CLIENT_SECRET: test-client-secret

      - name: Run TypeScript type checking
        run: npm run typecheck
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"

      - name: Build application (fast)
        run: npm run build:fast
        env:
          DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/testdb
          JWT_SECRET: test-secret-for-ci
          GOOGLE_CLIENT_ID: test-client-id
          GOOGLE_CLIENT_SECRET: test-client-secret

      - name: Start backend for API security verification
        run: |
          # Start backend using the ci environment configuration
          cd ../..
          export SEMIONT_ROOT=$(pwd)
          export SEMIONT_ENV=ci
          export NODE_ENV=test
          export DATABASE_URL=postgresql://testuser:testpassword@localhost:5432/testdb
          export JWT_SECRET=test-secret-for-ci
          export GOOGLE_CLIENT_ID=test-client-id
          export GOOGLE_CLIENT_SECRET=test-client-secret

          echo "Starting backend with SEMIONT_ENV=ci..."
          cd apps/backend
          nohup npm start > backend.log 2>&1 &
          APP_PID=$!
          echo "BACKEND_PID=$APP_PID" >> $GITHUB_ENV

          # Give it a moment to start
          sleep 5

          # Check if process is still running
          if ! kill -0 $APP_PID 2>/dev/null; then
            echo "Backend process died immediately. Logs:"
            cat backend.log
            exit 1
          fi

          # Try to curl the health endpoint (ci.json uses port 4000)
          echo "Attempting to connect to backend health endpoint..."
          for i in {1..30}; do
            if curl -f -v http://localhost:4000/api/health 2>&1; then
              echo "Backend is healthy!"
              break
            fi
            echo "Attempt $i failed, waiting..."
            sleep 2

            # Check if process is still alive
            if ! kill -0 $APP_PID 2>/dev/null; then
              echo "Backend process died. Logs:"
              cat backend.log
              exit 1
            fi
          done

          # Final check
          if ! curl -f http://localhost:4000/api/health 2>/dev/null; then
            echo "Backend never became healthy. Process status:"
            ps aux | grep -E "node|npm" || true
            echo "Backend logs:"
            cat backend.log
            exit 1
          fi

      - name: Verify API security
        run: |
          echo "Testing backend API security..."

          # Test 1: Verify admin endpoints require authentication
          endpoints=("/api/admin/users" "/api/admin/users/stats")

          for endpoint in "${endpoints[@]}"; do
            echo "Testing $endpoint..."

            # Test without Authorization header
            status_code=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:4000$endpoint")
            if [ "$status_code" != "401" ]; then
              echo "❌ SECURITY FAILURE: $endpoint returned $status_code instead of 401 for missing auth"
              exit 1
            fi
            echo "✅ $endpoint properly returns 401 for missing authentication"

            # Test with invalid token
            status_code=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer invalid-token" "http://localhost:4000$endpoint")
            if [ "$status_code" != "401" ]; then
              echo "❌ SECURITY FAILURE: $endpoint returned $status_code instead of 401 for invalid token"
              exit 1
            fi
            echo "✅ $endpoint properly returns 401 for invalid token"
          done

          # Test 2: Verify error responses don't leak sensitive data
          response=$(curl -s http://localhost:4000/api/admin/users)
          if echo "$response" | grep -qE "postgresql://|secret|jwt.*key|password|database.*connection|stack.*trace|\.js:[0-9]+"; then
            echo "❌ SECURITY FAILURE: Sensitive data leaked in API error response!"
            echo "Response: $response"
            exit 1
          fi
          echo "✅ No sensitive data leaked in API error responses"

          # Test 3: Verify proper JSON error format
          if ! echo "$response" | grep -q '"error".*"Unauthorized"'; then
            echo "❌ SECURITY FAILURE: API doesn't return proper JSON error format"
            exit 1
          fi
          echo "✅ Proper JSON error format returned"

          # Test 4: Password authentication endpoint security
          echo "Testing password authentication endpoint security..."

          # Test 4a: Missing email field
          response=$(curl -s -w "\n%{http_code}" -X POST http://localhost:4000/api/tokens/password \
            -H "Content-Type: application/json" \
            -d '{"password":"test"}')
          status_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | head -n-1)

          if [ "$status_code" != "400" ]; then
            echo "❌ SECURITY FAILURE: Password endpoint returned $status_code instead of 400 for missing email"
            exit 1
          fi
          echo "✅ Password endpoint returns 400 for missing email"

          # Test 4b: Missing password field
          response=$(curl -s -w "\n%{http_code}" -X POST http://localhost:4000/api/tokens/password \
            -H "Content-Type: application/json" \
            -d '{"email":"test@example.com"}')
          status_code=$(echo "$response" | tail -n1)

          if [ "$status_code" != "400" ]; then
            echo "❌ SECURITY FAILURE: Password endpoint returned $status_code instead of 400 for missing password"
            exit 1
          fi
          echo "✅ Password endpoint returns 400 for missing password"

          # Test 4c: Invalid credentials (should return 401)
          response=$(curl -s -w "\n%{http_code}" -X POST http://localhost:4000/api/tokens/password \
            -H "Content-Type: application/json" \
            -d '{"email":"nonexistent@example.com","password":"wrongpassword"}')
          status_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | head -n-1)

          if [ "$status_code" != "401" ]; then
            echo "❌ SECURITY FAILURE: Password endpoint returned $status_code instead of 401 for invalid credentials"
            exit 1
          fi

          # Verify error message doesn't reveal whether user exists (email enumeration prevention)
          if echo "$body" | grep -qi "user.*not.*found\|email.*not.*exist\|no.*user\|unknown.*email"; then
            echo "❌ SECURITY FAILURE: Password endpoint reveals user existence (email enumeration vulnerability)!"
            echo "Response: $body"
            exit 1
          fi

          if ! echo "$body" | grep -qi "invalid.*credentials\|authentication.*failed"; then
            echo "⚠️ WARNING: Password endpoint should use generic error message like 'Invalid credentials'"
          fi
          echo "✅ Password endpoint returns generic error (prevents email enumeration)"

          # Test 4d: No sensitive data in error responses
          if echo "$body" | grep -qE "bcrypt|hash|salt|postgresql://|jwt.*key|\.js:[0-9]+|stack.*trace"; then
            echo "❌ SECURITY FAILURE: Password endpoint leaks sensitive data in error response!"
            echo "Response: $body"
            exit 1
          fi
          echo "✅ No sensitive data leaked in password authentication errors"

          # Test 4e: Verify SQL injection protection (basic test)
          response=$(curl -s -w "\n%{http_code}" -X POST http://localhost:4000/api/tokens/password \
            -H "Content-Type: application/json" \
            -d '{"email":"admin@example.com'\'' OR '\''1'\''='\''1","password":"test"}')
          status_code=$(echo "$response" | tail -n1)

          if [ "$status_code" != "400" ] && [ "$status_code" != "401" ]; then
            echo "❌ SECURITY FAILURE: Password endpoint may be vulnerable to SQL injection (status: $status_code)"
            exit 1
          fi
          echo "✅ Password endpoint appears protected against SQL injection"

          echo "🎉 All backend API security checks passed!"

      - name: Stop backend
        if: always()
        run: |
          if [ ! -z "$BACKEND_PID" ]; then
            kill $BACKEND_PID || true
          fi
          # Kill any remaining Node.js processes
          pkill -f "node.*dist/index.js" || true

      - name: Upload test coverage
        uses: codecov/codecov-action@v7.0.0
        if: always()
        with:
          file: ./apps/backend/coverage/lcov.info
          flags: backend
          name: backend-coverage
        continue-on-error: true

  security-report:
    name: Security Test Report
    runs-on: ubuntu-latest
    needs: [frontend-security, backend-security]
    if: always()

    steps:
      - name: Report Results
        run: |
          echo "## 🛡️ Security Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.frontend-security.result }}" == "success" ]; then
            echo "✅ **Frontend Security Tests**: PASSED" >> $GITHUB_STEP_SUMMARY
            echo "- SPA shell serves correctly for admin/moderate routes" >> $GITHUB_STEP_SUMMARY
            echo "- No server-rendered privileged content in SPA shell" >> $GITHUB_STEP_SUMMARY
            echo "- No sensitive data patterns in responses" >> $GITHUB_STEP_SUMMARY
            echo "- Client-side auth guards verified by unit tests" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Frontend Security Tests**: FAILED" >> $GITHUB_STEP_SUMMARY
            echo "- **CRITICAL**: Security vulnerabilities detected!" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.backend-security.result }}" == "success" ]; then
            echo "✅ **Backend Security Tests**: PASSED" >> $GITHUB_STEP_SUMMARY
            echo "- API authentication enforced" >> $GITHUB_STEP_SUMMARY
            echo "- Admin endpoints properly protected" >> $GITHUB_STEP_SUMMARY
            echo "- Password authentication secure (no email enumeration)" >> $GITHUB_STEP_SUMMARY
            echo "- SQL injection protection verified" >> $GITHUB_STEP_SUMMARY
            echo "- No sensitive data leakage" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Backend Security Tests**: FAILED" >> $GITHUB_STEP_SUMMARY
            echo "- **CRITICAL**: API security vulnerabilities detected!" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.frontend-security.result }}" == "success" ] && [ "${{ needs.backend-security.result }}" == "success" ]; then
            echo "🎉 **Overall Status**: ALL SECURITY CHECKS PASSED" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The application is secure and ready for deployment." >> $GITHUB_STEP_SUMMARY
          else
            echo "🚨 **Overall Status**: SECURITY FAILURES DETECTED" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**DO NOT MERGE** - Fix security issues before proceeding." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Fail if security tests failed
        if: needs.frontend-security.result != 'success' || needs.backend-security.result != 'success'
        run: |
          echo "Security tests failed. Failing the workflow."
          exit 1